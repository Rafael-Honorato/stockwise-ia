<div class="flex h-screen bg-slate-950">
  <aside
    [ngClass]="isCollapsed ? 'w-18' : 'w-64'"
    class="relative h-full bg-gray-800 border-r border-cyan-900/50 transition-all duration-300 ease-in-out flex flex-col"
  >
    <div class="flex items-center p-4 mb-6 justify-between">
      <button
        (click)="toggleSidebar()"
        class="p-2 rounded-lg hover:bg-cyan-900/30 transition-colors text-cyan-400"
      >
        <i class="pi pi-bars" style="font-size: 1.2rem"></i>
      </button>
      <span>
        <img src="/stockwise-white.webp" width="170" alt="" />
      </span>
    </div>

    <nav class="flex-1 px-3 space-y-2">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        [routerLinkActiveOptions]="
          item.exact ? { exact: true } : { exact: false }
        "
        routerLinkActive="bg-cyan-900/60 text-cyan-400 border-r-2 border-l-2 border-cyan-500"
        class="flex items-center p-3 rounded-lg hover:bg-cyan-800/20 group cursor-pointer transition-colors duration-300"
      >
        <i [class]="item.icon" style="font-size: 1.2rem"></i>
        <span
          *ngIf="!isCollapsed"
          class="ml-4 font-medium whitespace-nowrap transition-opacity duration-200"
        >
          {{ item.label }}
        </span>

        <span
          *ngIf="isCollapsed"
          class="absolute left-16 scale-0 group-hover:scale-100 bg-cyan-900 text-white text-xs p-2 rounded shadow-lg transition-transform"
        >
          {{ item.label }}
        </span>
      </a>
    </nav>

    <div class="p-4 border-t border-cyan-900/30 flex">
      <div
        [ngClass]="!isCollapsed ? 'flex-row' : 'flex-col text-center'"
        class="flex overflow-hidden gap-3 items-center w-full"
      >
        <div
          [ngClass]="!isCollapsed ? 'w-12 h-12' : 'w-10 h-10'"
          class="relative flex-shrink-0 rounded-full overflow-hidden border-2 border-cyan-500/30 aspect-square"
        >
          <img
            src="/perfil.webp"
            alt="Perfil"
            class="w-full h-full object-cover"
          />
        </div>

        <div
          class="flex flex-col min-w-0"
          [ngClass]="isCollapsed ? 'items-center' : 'items-start'"
        >
          @if (!isCollapsed) {
            <p class="text-slate-50 font-semibold leading-tight">
              Nome Usuário
            </p>
            <p class="text-cyan-100/60 text-xs mb-1">Função usuário</p>
            <a
              class="text-xs font-bold text-cyan-400 hover:text-cyan-300 transition-colors cursor-pointer uppercase tracking-wider"
            >
              Sair
            </a>
          } @else {
            <a
              class="text-[10px] font-bold text-cyan-400 hover:text-cyan-300 transition-colors cursor-pointer uppercase mt-1"
            >
              Sair
            </a>
          }
        </div>
      </div>
    </div>
  </aside>
</div>
