<div class="flex justify-end mb-4">
  <p-button
    icon="pi pi-plus"
    rounded=""
    class="mt-[-30px]"
    (onClick)="create()"
  ></p-button>
</div>
<div class="card">
  <p-table
    [value]="stores"
    [paginator]="true"
    [rows]="5"
    [rowsPerPageOptions]="[5, 10, 20]"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template #header>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Contact</th>
        <th class="flex justify-end">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-store let-rowIndex="rowIndex">
      <tr>
        <td>{{ rowIndex + 1 }}</td>
        <td>{{ store.name }}</td>
        <td>{{ store.contact | phone }}</td>
        <td class="flex justify-end gap-2">
          <p-button
            icon="pi pi-pen-to-square"
            size="small"
            [raised]="true"
            severity="secondary"
            (click)="edit(store.id)"
          ></p-button>
          <p-button
            icon="pi pi-trash"
            size="small"
            [raised]="true"
            severity="secondary"
            (click)="delete(store.id)"
          ></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
