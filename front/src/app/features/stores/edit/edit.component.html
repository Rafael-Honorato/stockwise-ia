<form [formGroup]="editForm">
  <div class="flex gap-2 flex-col w-full">
    <p class="text-2xl mb-4">Loja: {{ nomeLoja() }}</p>
    <p-floatlabel variant="in" class="flex-1">
      <input
        pInputText
        id="nome"
        formControlName="name"
        autocomplete="off"
        class="w-full"
      />
      <label for="nome">Nome:</label>
    </p-floatlabel>
    <p-floatlabel variant="in" class="flex-1">
      <p-inputmask
        id="contact"
        mask="(99) 99999-9999"
        formControlName="contact"
        class="w-full"
      />
      <label for="contact">Contato:</label>
    </p-floatlabel>
    <div class="flex justify-end gap-4 mt-2">
      <p-button
        icon="pi pi-times-circle"
        label="Cancelar"
        variant="outlined"
        severity="secondary"
        size="small"
        (onClick)="cancel()"
      ></p-button>
      <p-button
        icon="pi pi-check"
        label="Editar"
        size="small"
        type="submit"
        [loading]="loading()"
        (onClick)="edit()"
      ></p-button>
    </div>
  </div>
</form>
