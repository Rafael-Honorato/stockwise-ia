<app-card>
  <div class="flex gap-4 justify-between w-full p-2 h-full">
    <div class="flex flex-col gap-1 justify-between h-full">
      <div
        class="text-[9px] font-bold text-cyan-400 uppercase tracking-wider border-b-2 border-cyan-500/80 pb-1"
      >
        {{ title }}
      </div>

      <div class="flex flex-col gap-1 align-center justify-between">
        <div
          class="flex flex-col items-start leading-tight justify-between h-full"
        >
          <span class="text-2xl font-black text-slate-50">
            {{ value | currency: "BRL" }}
          </span>
          <span class="text-[10px] font-bold uppercase text-slate-300"
            >Total vendido</span
          >
        </div>
      </div>

      <span class="text-xs text-slate-400 italic">
        {{ description }}
      </span>
    </div>

    <div
      class="flex flex-col gap-1 text-center min-w-[60px] h-full items-center justify-center"
    >
      <i class="pi pi-box text-3xl text-cyan-500/80 mb-1"></i>
      <div class="leading-none flex flex-col items-center">
        <span class="text-lg font-bold text-slate-200">{{ quantity }}</span>
        <span class="text-[10px] font-bold text-cyan-700 uppercase">itens</span>
      </div>
    </div>
  </div>
</app-card>
