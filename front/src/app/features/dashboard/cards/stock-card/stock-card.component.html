<app-card>
  <div class="flex gap-4 items-center justify-between w-full p-2">
    <div class="flex flex-col gap-1 w-full">
      <div
        class="text-[9px] font-bold text-cyan-400 uppercase tracking-wider border-b-2 border-cyan-500/80 pb-1"
      >
        {{ title }}
      </div>

      <div class="flex flex-col gap-1">
        <div class="flex flex-col items-start leading-tight">
          <span class="text-xl font-black text-slate-50">
            {{ costPrice }}
          </span>
          <span class="text-[10px] font-bold uppercase text-slate-300"
            >Custo</span
          >
        </div>

        <div class="flex flex-col items-start leading-tight">
          <span class="text-xl font-black text-emerald-400">
            {{ salesPrice }}
          </span>
          <span class="text-[10px] font-bold uppercase text-slate-300">
            Venda Prevista
          </span>
        </div>
      </div>

      <span class="text-xs text-slate-400 italic">
        {{ description }}
      </span>
    </div>

    <div class="flex flex-col items-center gap-1 text-center min-w-[60px]">
      <i class="pi pi-box text-3xl text-cyan-500/80 mb-1"></i>
      <div class="leading-none flex flex-col items-center">
        <span class="text-lg font-bold text-slate-200">{{ quantity }}</span>
        <span class="text-[10px] font-bold text-cyan-700 uppercase">itens</span>
      </div>
    </div>
  </div>
</app-card>
